name: Release Zarf Package

on:
  schedule:
    - cron: "15 2 * * *"
  push:
    branches:
      - main
    paths-ignore:
      - flake.*
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  info:
    name: Determine build info
    runs-on: ubuntu-latest
    steps:
      - name: Clone the repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Determine Build Tag
        id: tag
        env:
          sha: ${{ github.sha }}
          job: ${{ github.run_number }}
        run: |-
          echo "TAG=$(yq '.metadata.version' zarf.yaml)-$(echo $job-${sha:0:8})" >> $GITHUB_OUTPUT

      - name: Get Git Tag Info
        id: git-tag
        run: |-
          if ${{ startsWith(github.ref, 'refs/tags/') }}; then
            echo "tag=$(echo ${{ github.ref }} | sed 's!refs/tags/!!g')"
            echo "tag=$(echo ${{ github.ref }} | sed 's!refs/tags/!!g')" >> $GITHUB_OUTPUT
          else
            echo "TAG=''"
            echo "TAG=''" >> $GITHUB_OUTPUT
          fi

      - name: Output version
        id: determine
        run: |-
          if [[ "${{ steps.git-tag.outputs.TAG }}" != "''" ]]; then
            echo "version=${{ steps.git-tag.outputs.TAG }}"
            echo "version=${{ steps.git-tag.outputs.TAG }}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ steps.tag.outputs.TAG }}"
            echo "version=${{ steps.tag.outputs.TAG }}" >> $GITHUB_OUTPUT
          fi
    outputs:
      tag: ${{ steps.determine.outputs.version }}

  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: write
    needs:
      - info
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        flavor:
          - upstream
          - minimus
        arch:
          - amd64
          - arm64
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Install The Latest Release Version of Zarf
        uses: zarf-dev/setup-zarf@10e539efed02f75ec39eb8823e22a5c795f492ae # v1.0.1

      - name: Login to GitHub Container Registry
        uses: docker/login-action@abd2ef45e78c5afb21d64d4ca52ee8550d9572c7 # v4.5.1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker hub
        uses: docker/login-action@abd2ef45e78c5afb21d64d4ca52ee8550d9572c7 # v4.5.1
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Package Zarf package
        run: |-
          zarf package create --confirm . \
            --architecture ${{ matrix.arch }} \
            --flavor ${{ matrix.flavor }} \
            --signing-key env://COSIGN_KEY \
            --signing-key-pass ${{ secrets.COSIGN_PASS }}
        env:
          COSIGN_KEY: ${{ secrets.COSIGN_KEY }}

      - name: Publish Zarf package
        run: |-
          zarf package publish zarf-*.zst \
            oci://ghcr.io/${{ github.repository_owner }}/zarf \
            --key https://raw.githubusercontent.com/colonel-byte/zarf-slim-init/refs/heads/main/cosign.pub \
            --with-build-machine-info=false

      - name: Publish Zarf package, tagged commit
        run: |-
          zarf package publish zarf-*.zst \
            oci://ghcr.io/${{ github.repository_owner }}/zarf \
            --key https://raw.githubusercontent.com/colonel-byte/zarf-slim-init/refs/heads/main/cosign.pub \
            --with-build-machine-info=false \
            --tag ${{ needs.info.outputs.tag }}-${{ matrix.flavor }}
