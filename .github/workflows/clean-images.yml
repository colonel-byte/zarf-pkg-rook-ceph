---
name: Daily Image Cleanup
on:
  # every day at 01:30am
  schedule:
    - cron: '30 1 * * *'
  # or manually
  workflow_dispatch:
jobs:
  ghcr-cleanup-image:
    name: ghcr cleanup action
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Delete old tags
        uses: dataaxiom/ghcr-cleanup-action@374e2028c8fb93b7219f3771cd405fab95d3dec4 # v1.2.0
        with:
          packages: "zarf/rook-ceph"
          use-regex: true
          exclude-tags: "^v\\d+\\.\\d+\\.\\d+-(upstream|registry1)$"
          token: '${{ secrets.GITHUB_TOKEN }}'
          keep-n-untagged: 0
          keep-n-tagged: 0

      - name: Validate images
        uses: dataaxiom/ghcr-cleanup-action@374e2028c8fb93b7219f3771cd405fab95d3dec4 # v1.2.0
        with:
          packages: "zarf/rook-ceph"
          token: ${{ secrets.GITHUB_TOKEN }}
          validate: true
          delete-ghost-images: true
          delete-orphaned-images: true
          delete-untagged: true
