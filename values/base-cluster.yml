---
toolbox:
  enabled: true
  tolerations:
    - operator: Exists
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - preference:
            matchExpressions:
              - key: "###ZARF_VAR_NODE_INFRASTRUCTURE_LABEL###"
                operator: In
                values:
                  - "true"
          weight: 100
  resources:
    limits:
      cpu: null
      memory: 128Mi
    requests:
      cpu: null
      memory: 32Mi
storage:
  useAllNodes: true
  useAllDevices: true
monitoring:
  enabled: false
  createPrometheusRules: false
pspEnable: false
cephClusterSpec:
  dataDirHostPath: "###ZARF_VAR_ROOK_CEPH_DATA_DIR###"
  dashboard:
    enabled: true
    ssl: false
  storage:
    useAllNodes: true
    useAllDevices: true
    config:
      encryptedDevice: "true" # Enable encryption at rest
  mon:
    count: 3
    allowMultiplePerNode: false
  mgr:
    count: 2
    allowMultiplePerNode: false
    modules:
      - name: pg_autoscaler
        enabled: true
  placement:
    all:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: "###ZARF_VAR_NODE_INFRASTRUCTURE_LABEL###"
                  operator: In
                  values:
                    - "true"
      tolerations:
        - key: InfrastructureOnly
          effect: NoSchedule
          operator: Exists
    osd:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: "###ZARF_VAR_NODE_INFRASTRUCTURE_LABEL###"
                  operator: In
                  values:
                    - "true"
      tolerations:
        - key: InfrastructureOnly
          effect: NoSchedule
          operator: Exists
    mon:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: "###ZARF_VAR_NODE_INFRASTRUCTURE_LABEL###"
                  operator: In
                  values:
                    - "true"
      tolerations:
        - key: InfrastructureOnly
          effect: NoSchedule
          operator: Exists
    mgr:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: "###ZARF_VAR_NODE_INFRASTRUCTURE_LABEL###"
                  operator: In
                  values:
                    - "true"
      tolerations:
        - key: InfrastructureOnly
          effect: NoSchedule
          operator: Exists
  resources:
    mgr:
      limits:
        memory: "1536Mi"
      requests:
        cpu: "250m"
        memory: "768Mi"
    mon:
      limits:
        memory: "2Gi"
      requests:
        cpu: "250m"
        memory: "1Gi"
    osd:
      limits:
        memory: "4Gi"
      requests:
        cpu: "500m"
        memory: "4Gi"
    prepareosd:
      requests:
        cpu: "500m"
        memory: "512Mi"
    mgr-sidecar:
      limits:
        memory: "100Mi"
      requests:
        cpu: "100m"
        memory: "40Mi"
    crashcollector:
      limits:
        memory: "64Mi"
      requests:
        cpu: "10m"
        memory: "32Mi"
    logcollector:
      limits:
        memory: "256Mi"
      requests:
        cpu: "10m"
        memory: "32Mi"
    cleanup:
      limits:
        memory: "1Gi"
      requests:
        cpu: "500m"
        memory: "100Mi"
    exporter:
      limits:
        cpu: 1000m
        memory: 128Mi
      requests:
        cpu: 50m
        memory: 50Mi
  healthCheck:
    daemonHealth:
      mon:
        disabled: false
        interval: 45s
      osd:
        disabled: false
        interval: 60s
      status:
        disabled: false
        interval: 60s
    livenessProbe:
      mon:
        disabled: false
      mgr:
        disabled: false
      osd:
        disabled: false
  removeOSDsIfOutAndSafeToRemove: false
  priorityClassNames:
    mon: system-node-critical
    osd: system-node-critical
    mgr: system-cluster-critical
cephBlockPools:
  - name: ceph-blockpool
    spec:
      failureDomain: host
      replicated:
        size: 2
    storageClass:
      enabled: true
      name: ceph-block
      isDefault: true
      reclaimPolicy: Delete
      allowVolumeExpansion: true
      volumeBindingMode: "Immediate"
      mountOptions: []
      allowedTopologies: []
      parameters:
        imageFormat: "2"
        imageFeatures: layering
        csi.storage.k8s.io/provisioner-secret-name: rook-csi-rbd-provisioner
        csi.storage.k8s.io/provisioner-secret-namespace: rook-ceph
        csi.storage.k8s.io/controller-expand-secret-name: rook-csi-rbd-provisioner
        csi.storage.k8s.io/controller-expand-secret-namespace: rook-ceph
        csi.storage.k8s.io/node-stage-secret-name: rook-csi-rbd-node
        csi.storage.k8s.io/node-stage-secret-namespace: rook-ceph
        csi.storage.k8s.io/fstype: ext4
cephFileSystems:
  - name: ceph-filesystem
    spec:
      metadataPool:
        replicated:
          size: 3
      dataPools:
        - failureDomain: host
          replicated:
            size: 3
          name: data0
      metadataServer:
        activeCount: 1
        activeStandby: true
        resources:
          limits:
            memory: "4Gi"
          requests:
            cpu: "250m"
            memory: "1Gi"
        priorityClassName: system-cluster-critical
        placement:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                    - key: "###ZARF_VAR_NODE_INFRASTRUCTURE_LABEL###"
                      operator: In
                      values:
                        - "true"
          podAntiAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              - labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/part-of
                      operator: In
                      values:
                        - ceph-filesystem
                topologyKey: kubernetes.io/hostname
          tolerations:
            - key: InfrastructureOnly
              operator: Exists
    storageClass:
      enabled: true
      isDefault: false
      name: ceph-filesystem
      pool: data0
      reclaimPolicy: Delete
      allowVolumeExpansion: true
      volumeBindingMode: "Immediate"
      mountOptions: []
      parameters:
        csi.storage.k8s.io/provisioner-secret-name: rook-csi-cephfs-provisioner
        csi.storage.k8s.io/provisioner-secret-namespace: "{{ .Release.Namespace }}"
        csi.storage.k8s.io/controller-expand-secret-name: rook-csi-cephfs-provisioner
        csi.storage.k8s.io/controller-expand-secret-namespace: "{{ .Release.Namespace }}"
        csi.storage.k8s.io/node-stage-secret-name: rook-csi-cephfs-node
        csi.storage.k8s.io/node-stage-secret-namespace: "{{ .Release.Namespace }}"
        csi.storage.k8s.io/fstype: ext4
cephObjectStores:
  - name: ceph-objectstore
    spec:
      metadataPool:
        failureDomain: host
        replicated:
          size: 3
      dataPool:
        failureDomain: host
        erasureCoded:
          dataChunks: 2
          codingChunks: 1
      preservePoolsOnDelete: true
      gateway:
        instances: 3
        port: 8080
        resources:
          limits:
            memory: "2Gi"
          requests:
            cpu: "250m"
            memory: "512Mi"
        priorityClassName: system-cluster-critical
        placement:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                    - key: "###ZARF_VAR_NODE_INFRASTRUCTURE_LABEL###"
                      operator: In
                      values:
                        - "true"
          podAntiAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              - labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/part-of
                      operator: In
                      values:
                        - ceph-objectstore
                topologyKey: kubernetes.io/hostname
          tolerations:
            - key: InfrastructureOnly
              operator: Exists
    storageClass:
      enabled: true
      name: ceph-bucket
      reclaimPolicy: Delete
      volumeBindingMode: "Immediate"
      parameters:
        region: us-east-1
