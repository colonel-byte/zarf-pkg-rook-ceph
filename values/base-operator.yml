---
resources:
  limits:
    cpu: null
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi
csi:
  enableLiveness: true
  csiRBDProvisionerResource: ""
  csiRBDPluginResource: ""
  csiCephFSProvisionerResource: ""
  csiCephFSPluginResource: ""
  csiNFSProvisionerResource: ""
  csiNFSPluginResource: ""
  csiAddons:
    enabled: true
  pluginTolerations:
    - operator: Exists
  provisionerTolerations:
    - key: InfrastructureOnly
      operator: Exists
  provisionerNodeAffinity: "###ZARF_VAR_NODE_INFRASTRUCTURE_LABEL###=true"
tolerations:
  - operator: "Exists"
affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: CriticalOnly
              operator: Exists
discover:
  tolerations:
    - effect: NoSchedule
      key: CriticalOnly
      operator: Exists
imagePullSecrets:
  - name: private-registry
ceph-csi-operator:
  controllerManager:
    podSecurityContext:
      runAsNonRoot: true
    # will work after this is merged and rook is updated
    # https://github.com/ceph/ceph-csi-operator/pull/353
    tolerations:
      - operator: "Exists"
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: CriticalOnly
                  operator: Exists
  imagePullSecrets:
    - name: private-registry
hostpathRequiresPrivileged: true
# might need this one too for selinux support
enablePluginSelinuxHostMount: true
nodeSelector:
  "###ZARF_VAR_NODE_INFRASTRUCTURE_LABEL###": "true"
admissionController:
  tolerations:
    - operator: "Exists"
agent:
  tolerations:
    - operator: "Exists"
