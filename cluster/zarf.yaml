---
# yaml-language-server: $schema=https://raw.githubusercontent.com/zarf-dev/zarf/main/zarf.schema.json
kind: ZarfPackageConfig
metadata:
  name: zarf-package-rook-ceph-cluster
components:
  - name: cluster-chart
    charts:
      - name: rook-ceph-cluster
        namespace: rook-ceph
        releaseName: rook-ceph-cluster
        noWait: true
        url: oci://ghcr.io/rook/rook-ceph-cluster
        # renovate: datasource=docker depName=ghcr.io/rook/rook-ceph-cluster
        version: v1.20.2
        valuesFiles:
          - ../values/base-cluster.yml
      - name: ceph-csi-drivers
        namespace: rook-ceph
        releaseName: rook-ceph-driver
        noWait: true
        url: https://ceph.github.io/ceph-csi-operator
        # renovate: datasource=helm depName=ceph-csi-drivers registryUrl=https://ceph.github.io/ceph-csi-operator
        version: 1.0.4
        valuesFiles:
          - ../values/base-csi-driver.yml
    actions:
      onDeploy:
        after:
          - wait:
              cluster:
                kind: cephcluster
                name: rook-ceph
                condition: "'{.status.phase}'=Ready"
                namespace: rook-ceph
            maxTotalSeconds: 2700
            description: Waiting for ceph cluster to be ready
          - wait:
              cluster:
                kind: cephblockpool
                name: ceph-blockpool
                condition: "'{.status.phase}'=Ready"
                namespace: rook-ceph
            maxTotalSeconds: 2700
            description: Waiting for ceph blockpool to be ready
          - wait:
              cluster:
                kind: cephfilesystem
                name: ceph-filesystem
                condition: "'{.status.phase}'=Ready"
                namespace: rook-ceph
            maxTotalSeconds: 2700
            description: Waiting for ceph filesystem to be ready
          - wait:
              cluster:
                kind: cephobjectstore
                name: ceph-objectstore
                condition: "'{.status.phase}'=Ready"
                namespace: rook-ceph
            maxTotalSeconds: 2700
            description: Waiting for ceph objectstore to be ready
          - wait:
              cluster:
                kind: pod
                name: app=rook-ceph.rbd.csi.ceph.com-nodeplugin
                condition: Ready
                namespace: rook-ceph
            maxTotalSeconds: 2700
            description: Waiting for rbd pods to be stable
          - wait:
              cluster:
                kind: pod
                name: app=rook-ceph.cephfs.csi.ceph.com-nodeplugin
                condition: Ready
                namespace: rook-ceph
            maxTotalSeconds: 2700
            description: Waiting for cephfs pods to be stable
